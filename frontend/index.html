<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess Tactics</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <main class="shell">
      <section class="game">
        <header class="topbar">
          <div>
            <h1>Chess Tactics</h1>
            <p id="statusLine">Breach 1 / 6</p>
          </div>
          <div class="topbar-right">
            <div class="account" id="account">
              <img id="accountAvatar" class="account-avatar" alt="" hidden>
              <span id="accountName">Guest</span>
              <button id="signInButton" type="button">Sign In</button>
              <button id="signOutButton" type="button" hidden>Sign Out</button>
            </div>
            <div class="meters" aria-live="polite">
              <span id="anchorMeter">Anchors 6</span>
              <span id="enemyMeter">Threats 0</span>
            </div>
          </div>
        </header>

        <div class="board-wrap">
          <svg class="skyline" viewBox="0 0 1200 360" preserveAspectRatio="xMidYMax slice" aria-hidden="true">
            <defs>
              <pattern id="win" width="13" height="18" patternUnits="userSpaceOnUse">
                <rect x="3" y="5" width="3" height="4" fill="#7d65bf" opacity="0.55" />
                <rect x="8" y="10" width="3" height="4" fill="#6c54ab" opacity="0.45" />
              </pattern>
            </defs>
            <path d="M0,360 0,210 80,210 80,170 180,170 180,232 300,232 300,150 430,150 430,205 560,205 560,120 690,120 690,192 820,192 820,160 960,160 960,214 1080,214 1080,176 1200,176 1200,360 Z" fill="#241a3e" />
            <path id="cityFront" d="M0,360 0,262 64,262 64,300 150,300 150,240 250,240 250,292 350,292 350,222 470,222 470,282 610,282 610,250 730,250 730,300 870,300 870,242 1010,242 1010,286 1130,286 1130,256 1200,256 1200,360 Z" fill="#2e2350" />
            <path d="M0,360 0,262 64,262 64,300 150,300 150,240 250,240 250,292 350,292 350,222 470,222 470,282 610,282 610,250 730,250 730,300 870,300 870,242 1010,242 1010,286 1130,286 1130,256 1200,256 1200,360 Z" fill="url(#win)" />
          </svg>
          <canvas id="board" class="board" width="760" height="560" aria-label="Tactical board"></canvas>
          <div id="menuLayer" class="menu-layer"></div>
        </div>
      </section>

      <aside class="panel">
        <div class="panel-section">
          <h2 id="selectedName">Crown Lancer</h2>
          <p id="selectedMeta">Hybrid royal vanguard</p>
          <div class="actions">
            <button id="moveButton" class="active" type="button">Move</button>
            <button id="powerButton" type="button">Power</button>
            <button id="threatButton" type="button">Threats: Off</button>
            <button id="endButton" type="button">End Turn</button>
          </div>
        </div>

        <div class="panel-section roster" id="roster"></div>

        <div class="panel-section legend" aria-label="Board key">
          <div><i class="k-move"></i><span>Move range</span></div>
          <div><i class="k-power"></i><span>Capture target</span></div>
          <div><i class="k-danger"></i><span>Enemy threat range</span></div>
          <div><i class="k-threat"></i><span>Enemy back rows</span></div>
          <div><i class="k-spawn"></i><span>Allied back rows</span></div>
        </div>

        <div class="panel-section log" id="log" aria-live="polite"></div>
      </aside>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
