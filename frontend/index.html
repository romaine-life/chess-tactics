<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Chess Tactics</title>
    <style>
      html,
      body {
        background: #05090d;
        color: #dbe7ea;
        margin: 0;
      }

      .shell {
        visibility: hidden;
      }
    </style>
    <link rel="preload" as="font" type="font/woff2" href="/assets/fonts/jersey-10/jersey-10-latin.woff2" crossorigin>
    <link rel="preload" as="image" href="/assets/ui/main-menu-aspirational.png">
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="mission-id">
          <h1>Chess Tactics</h1>
          <p id="statusLine">Tactical chess. Infinite possibilities.</p>
        </div>
        <div class="topbar-right">
          <div class="account" id="account">
            <img id="accountAvatar" class="account-avatar" alt="" hidden>
            <span id="accountName">Guest</span>
            <button id="signInButton" type="button">Sign In</button>
            <button id="signOutButton" type="button" hidden>Sign Out</button>
          </div>
        </div>
      </header>
      <div id="root" class="app-root"></div>
    </main>

    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
