<!doctype html>
<meta charset="utf-8" />
<title>kit forge test — gear + speaker</title>
<style>
  body { margin: 0; padding: 24px; background: #0b141c; font-family: system-ui, sans-serif; }
  .row { display: flex; gap: 28px; align-items: flex-end; }
  .cell { text-align: center; color: #9fb0b7; font-size: 11px; }
  /* checkerboard so transparency is visible */
  .chip { width: 96px; height: 96px; margin-bottom: 6px;
    background-image:
      linear-gradient(45deg, #2a3640 25%, transparent 25%),
      linear-gradient(-45deg, #2a3640 25%, transparent 25%),
      linear-gradient(45deg, transparent 75%, #2a3640 75%),
      linear-gradient(-45deg, transparent 75%, #2a3640 75%);
    background-size: 16px 16px; background-position: 0 0, 0 8px, 8px -8px, -8px 0;
    background-color: #18242e; display: grid; place-items: center; }
  .chip img { width: 64px; height: 64px; image-rendering: auto; }
  .chip.small img { width: 28px; height: 28px; }
</style>
<div id="stage" class="row">
  <div class="cell"><div class="chip"><img src="/assets/ui/kit/icons/gear.png"></div>gear @64</div>
  <div class="cell"><div class="chip small"><img src="/assets/ui/kit/icons/gear.png"></div>gear @28</div>
  <div class="cell"><div class="chip"><img src="/assets/ui/kit/icons/speaker.png"></div>speaker @64</div>
  <div class="cell"><div class="chip small"><img src="/assets/ui/kit/icons/speaker.png"></div>speaker @28</div>
</div>
