<!doctype html>
<meta charset="utf-8" />
<title>Surface review — real settings page</title>
<style>
  :root { --ink:#edf3f4; --muted:#9fb0b7; --muted-2:#6f838c; --gold:#c9a44c; --cobalt:#65b8ff; }
  * { box-sizing:border-box; }
  html,body { height:100%; margin:0; }
  body { background:#05080c; color:var(--ink); font-family:system-ui,sans-serif; display:flex; flex-direction:column; }
  .controls { flex:none; display:flex; gap:18px; align-items:center; flex-wrap:wrap;
    padding:8px 14px; background:#0a1118; border-bottom:1px solid #1c2a35; font-size:12px; }
  .controls .grp { display:flex; gap:6px; align-items:center; }
  .controls .lbl { color:var(--muted-2); text-transform:uppercase; letter-spacing:.08em; font-size:10px; margin-right:2px; }
  button { font:700 12px/1 system-ui; color:var(--ink); background:#11202c; border:1px solid #243a4a;
    border-radius:5px; padding:7px 12px; cursor:pointer; }
  button:hover { border-color:#3a5a70; }
  button.on { background:#1d3a4f; border-color:var(--gold); color:#fff; }
  button:disabled { opacity:.3; cursor:not-allowed; }
  .note { color:var(--muted-2); margin-left:auto; }
  iframe { flex:1; width:100%; border:0; background:#05080c; }
</style>

<div class="controls">
  <div class="grp"><span class="lbl">approach</span>
    <button data-app="A">A · procedural</button>
    <button data-app="B">B · hybrid</button>
    <button data-app="C">C · pixel-model</button>
    <button data-app="baseline">baseline</button>
    <button data-app="D">D · pixellab</button>
  </div>
  <div class="grp"><span class="lbl">material</span>
    <button data-mat="stone-blue">stone-blue</button>
    <button data-mat="stone-grey">stone-grey</button>
    <button data-mat="wood-oak">wood-oak</button>
    <button data-mat="wood-walnut">wood-walnut</button>
  </div>
  <div class="grp"><span class="lbl">zoom</span>
    <button data-zoom="cover">fit</button>
    <button data-zoom="150%">1.5×</button>
    <button data-zoom="220%">2.2×</button>
  </div>
  <span class="note" id="status"></span>
</div>

<iframe id="app" src="/settings"></iframe>

<script>
  const AVAIL = {
    A: ['stone-blue','stone-grey','wood-oak','wood-walnut'],
    B: ['stone-blue','wood-oak'],
    C: ['stone-blue'],
    baseline: ['stone-blue','wood-oak'],
    D: ['stone-blue'],
  };
  const state = { app:'A', mat:'stone-blue', zoom:'cover' };
  const frame = document.getElementById('app');
  const $ = (s)=>document.querySelectorAll(s);

  function css() {
    const tex = `/assets/ui/explore/review/${state.app}-${state.mat}.png`;
    const fill = `background:url("${tex}") center/${state.zoom} no-repeat !important; image-rendering:pixelated !important;`;
    // Drop the `fill` from the kit panel 9-slice (border-image-slice without `fill` keeps the ring
    // + width but makes the center transparent) and put the texture behind it.
    return `
      [data-testid="settings"] .settings-frame,
      [data-testid="settings"] .settings-rail-frame,
      [data-testid="settings"] .app-titlebar.settings-header-frame {
        border-image-slice: 24 !important; ${fill} }
    `;
  }
  function inject() {
    try {
      const doc = frame.contentDocument;
      if (!doc) return;
      let el = doc.getElementById('surface-override');
      if (!el) { el = doc.createElement('style'); el.id = 'surface-override'; doc.head.appendChild(el); }
      el.textContent = css();
    } catch (e) { /* same-origin; ignore transient */ }
  }
  function apply() {
    const mats = AVAIL[state.app];
    if (!mats.includes(state.mat)) state.mat = mats[0];
    $('[data-app]').forEach(b=>b.classList.toggle('on', b.dataset.app===state.app));
    $('[data-mat]').forEach(b=>{ const ok=mats.includes(b.dataset.mat); b.disabled=!ok; b.classList.toggle('on', b.dataset.mat===state.mat); });
    $('[data-zoom]').forEach(b=>b.classList.toggle('on', b.dataset.zoom===state.zoom));
    document.getElementById('status').textContent = `${state.app}-${state.mat} · real /settings page`;
    inject();
  }
  $('[data-app]').forEach(b=>b.onclick=()=>{ state.app=b.dataset.app; apply(); });
  $('[data-mat]').forEach(b=>b.onclick=()=>{ if(!b.disabled){ state.mat=b.dataset.mat; apply(); } });
  $('[data-zoom]').forEach(b=>b.onclick=()=>{ state.zoom=b.dataset.zoom; apply(); });
  frame.addEventListener('load', apply);
  // keep re-applying briefly in case the SPA mounts Settings after load
  let n=0; const t=setInterval(()=>{ inject(); if(++n>20) clearInterval(t); }, 250);
</script>
