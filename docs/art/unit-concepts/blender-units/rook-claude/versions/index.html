<!doctype html>
<meta charset="utf-8">
<title>Rook — version gallery</title>
<style>
  body { background:#11151c; color:#cdd6e4; font:15px/1.5 system-ui, sans-serif; margin:0; padding:32px; }
  h1 { font-weight:600; letter-spacing:.02em; }
  .grid { display:flex; flex-wrap:wrap; gap:24px; margin-top:24px; }
  figure { background:#1b212b; border:1px solid #2a323f; border-radius:10px; padding:14px; margin:0; width:300px; }
  figure img { width:100%; image-rendering:auto; background:
      repeating-conic-gradient(#222b36 0% 25%, #1b212b 0% 50%) 0/22px 22px; border-radius:6px; }
  figcaption { margin-top:10px; }
  .tag { font-weight:600; color:#8fb8ff; }
  .desc { color:#94a0b4; font-size:13px; }
  a { color:inherit; text-decoration:none; }
  .blend { font-size:12px; color:#6b7688; }
</style>
<h1>Rook — version gallery</h1>
<p class="desc">Each card is one milestone. Click the image to open the full PNG; the .blend beside it is the editable fallback.</p>
<div class="grid">
  <figure><a href="v1-first-pass.png"><img src="v1-first-pass.png"></a>
    <figcaption><span class="tag">v1 · first pass</span><div class="desc">Rich navy, stacked 4-tier base, merlon top, vertical plank gate.</div>
    <div class="blend">v1-first-pass.blend</div></figcaption></figure>
  <figure><a href="v2-simple-base.png"><img src="v2-simple-base.png"></a>
    <figcaption><span class="tag">v2 · simple base</span><div class="desc">Base collapsed to one plinth + chamfered cap.</div>
    <div class="blend">v2-simple-base.blend</div></figcaption></figure>
  <figure><a href="v3-overhang-top.png"><img src="v3-overhang-top.png"></a>
    <figcaption><span class="tag">v3 · overhang top</span><div class="desc">Cantilevered battlement box; all four walls closed.</div>
    <div class="blend">v3-overhang-top.blend</div></figcaption></figure>
  <figure><a href="v4-open-sides.png"><img src="v4-open-sides.png"></a>
    <figcaption><span class="tag">v4 · open sides</span><div class="desc">Side notches opened — gate-front + rear wall only, so facing reads.</div>
    <div class="blend">v4-open-sides.blend</div></figcaption></figure>
  <figure><a href="v5-carved-stone.png"><img src="v5-carved-stone.png"></a>
    <figcaption><span class="tag">v5 · carved stone</span><div class="desc">Boolean one-mass, Cycles, AO grime + worn edges, subtle seams.</div>
    <div class="blend">v5-carved-stone.blend</div></figcaption></figure>
  <figure><a href="v6-masonry-varied-damage.png"><img src="v6-masonry-varied-damage.png"></a>
    <figcaption><span class="tag">v6 · masonry + varied damage</span><div class="desc">Running-bond ashlar; four different per-pillar failures.</div>
    <div class="blend">v6-masonry-varied-damage.blend</div></figcaption></figure>
  <figure><a href="v7-rough-rock-one-shear.png"><img src="v7-rough-rock-one-shear.png"></a>
    <figcaption><span class="tag">v7 · rough rock, one shear</span><div class="desc">Single sheared pillar; layered rock displacement on every face.</div>
    <div class="blend">v7-rough-rock-one-shear.blend</div></figcaption></figure>
</div>
