  body { background:#11151c; color:#cdd6e4; font:15px/1.5 system-ui, sans-serif; margin:0; padding:32px; }

<h1>Rook candidate units</h1>
<p class="note">Seven tentative rook units, one per render. Each is its own standalone thing —
own folder, sprite, <code>.blend</code> fallback, and <code>unit.json</code>. None of them touch the
production rook at <code>frontend/public/assets/units/rook</code>; they are candidates for review, not wired into the app.</p>
<div class="grid">
  <figure><a href="rook-old-keep/south.png"><img src="rook-old-keep/south.png"></a>
    <figcaption><div class="name">Old Keep</div><div class="desc">Classic stacked four-tier base, merlon battlements, vertical plank gate.</div>
    <div class="meta">rook-old-keep · from v1-first-pass</div></figcaption></figure>
  <figure><a href="rook-sentinel/south.png"><img src="rook-sentinel/south.png"></a>
    <figcaption><div class="name">Sentinel</div><div class="desc">Pared-down two-step base; merlon top; cleaner silhouette.</div>
    <div class="meta">rook-sentinel · from v2-simple-base</div></figcaption></figure>
  <figure><a href="rook-bastion/south.png"><img src="rook-bastion/south.png"></a>
    <figcaption><div class="name">Bastion</div><div class="desc">Cantilevered battlement box overhanging the shaft; four closed walls.</div>
    <div class="meta">rook-bastion · from v3-overhang-top</div></figcaption></figure>
  <figure><a href="rook-gatewatch/south.png"><img src="rook-gatewatch/south.png"></a>
    <figcaption><div class="name">Gatewatch</div><div class="desc">Open side notches, gate-front and rear wall; facing reads at a glance.</div>
    <div class="meta">rook-gatewatch · from v4-open-sides</div></figcaption></figure>
  <figure><a href="rook-masonkeep/south.png"><img src="rook-masonkeep/south.png"></a>
    <figcaption><div class="name">Masonkeep</div><div class="desc">One carved stone mass: AO cavity grime, worn light edges, subtle seams.</div>
    <div class="meta">rook-masonkeep · from v5-carved-stone</div></figcaption></figure>
  <figure><a href="rook-breachhold/south.png"><img src="rook-breachhold/south.png"></a>
    <figcaption><div class="name">Breachhold</div><div class="desc">Running-bond ashlar with four distinct per-pillar battle failures.</div>
    <div class="meta">rook-breachhold · from v6-masonry-varied-damage</div></figcaption></figure>
  <figure><a href="rook-ruinwall/south.png"><img src="rook-ruinwall/south.png"></a>
    <figcaption><div class="name">Ruinwall</div><div class="desc">Rough-hewn rock surface with a single sheared corner pillar.</div>
    <div class="meta">rook-ruinwall · from v7-rough-rock-one-shear</div></figcaption></figure>
</div>
