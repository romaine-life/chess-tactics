name: Build and Deploy

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - frontend/**
      - packages/board-render/**
      - Dockerfile
      - .dockerignore
      - scripts/image-fingerprint.sh
      - scripts/exact-image-approval.mjs
      - k8s/**
      - .github/workflows/build-and-deploy.yaml
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA whose previously built candidate should be verified."
        required: false
        type: string

permissions:
  id-token: write
  contents: write
  # Resolve the merged PR (title/number/url) for the built commit — surfaced in
  # Settings → About. See the "Resolve build metadata" step.
  pull-requests: read

concurrency:
  group: build-and-deploy
  cancel-in-progress: false

jobs:
  build-and-deploy:
    name: Verify image and pin Helm digest
    if: github.event_name == 'workflow_dispatch' || vars.ARM_CLIENT_ID != ''
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: chess-tactics
    # The backend smoke-test (npm test) exercises the Postgres-backed
    # persistence endpoints, so the test job needs a real Postgres.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chess_tactics
          POSTGRES_PASSWORD: chess_tactics
          POSTGRES_DB: chess_tactics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chess_tactics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          # Dispatch may inspect arbitrary same-repo revisions. Do not leave a
          # write-capable token in their Git config; the gated publish step
          # authenticates only after all target-controlled code has finished.
          persist-credentials: false

      - name: Resolve requested ref
        env:
          INPUT_REF: ${{ inputs.git_ref }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          target_ref="${INPUT_REF:-$GITHUB_SHA}"
          if full_sha="$(git rev-parse --verify "${target_ref}^{commit}" 2>/dev/null)"; then
            :
          elif git show-ref --verify --quiet "refs/remotes/origin/${target_ref}"; then
            full_sha="$(git rev-parse "refs/remotes/origin/${target_ref}^{commit}")"
          elif git show-ref --verify --quiet "refs/tags/${target_ref}"; then
            full_sha="$(git rev-parse "refs/tags/${target_ref}^{commit}")"
          else
            echo "::error::Unable to resolve git_ref '${target_ref}' to a commit."
            exit 1
          fi
          git checkout --detach "$full_sha"
          echo "Resolved ${target_ref} -> ${full_sha}"

      - name: Resolve build metadata
        id: meta
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          sha="$(git rev-parse HEAD)"
          short="$(git rev-parse --short HEAD)"
          # Select exactly the merged-to-main PR whose merge commit is this
          # revision. An API failure or ambiguous association stays empty and
          # the production gate below fails closed.
          prs_json="$(gh api "repos/${GITHUB_REPOSITORY}/commits/${sha}/pulls" \
            -H "Accept: application/vnd.github+json" 2>/dev/null || echo '[]')"
          pr_match_count="$(printf '%s' "$prs_json" | jq --arg sha "$sha" \
            '[.[] | select(.merged_at != null and .base.ref == "main" and .merge_commit_sha == $sha)] | length')"
          pr_json="$(printf '%s' "$prs_json" | jq -c --arg sha "$sha" \
            '[.[] | select(.merged_at != null and .base.ref == "main" and .merge_commit_sha == $sha)] | if length == 1 then .[0] else {} end')"
          pr_number="$(printf '%s' "$pr_json" | jq -r '.number // empty')"
          pr_title="$(printf '%s' "$pr_json" | jq -r '.title // empty')"
          pr_url="$(printf '%s' "$pr_json" | jq -r '.html_url // empty')"
          pr_head_sha="$(printf '%s' "$pr_json" | jq -r '.head.sha // empty')"
          # Fallback for direct pushes / dispatch with no API association: parse a
          # trailing "(#NNN)" from the commit subject (our squash-merge convention).
          if [ -z "$pr_number" ]; then
            subj="$(git log -1 --pretty=%s)"
            pr_number="$(printf '%s' "$subj" | sed -n 's/.*(#\([0-9][0-9]*\))$/\1/p')"
            if [ -n "$pr_number" ]; then
              pr_title="$(printf '%s' "$subj" | sed 's/ (#[0-9][0-9]*)$//')"
              pr_url="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/pull/${pr_number}"
            fi
          fi
          {
            echo "commit=${short}"
            echo "pr_number=${pr_number}"
            echo "pr_url=${pr_url}"
            echo "pr_head_sha=${pr_head_sha}"
            echo "pr_match_count=${pr_match_count}"
          } >> "$GITHUB_OUTPUT"
          # Title is free text — write it with a heredoc so quotes/newlines survive.
          {
            echo "pr_title<<__META_EOF__"
            printf '%s\n' "$pr_title"
            echo "__META_EOF__"
          } >> "$GITHUB_OUTPUT"
          echo "Build metadata: ${short} — ${pr_title:-(no title)} (#${pr_number:-?})" >> "$GITHUB_STEP_SUMMARY"

      - name: Require a unique merged PR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PR_HEAD_SHA: ${{ steps.meta.outputs.pr_head_sha }}
          PR_MATCH_COUNT: ${{ steps.meta.outputs.pr_match_count }}
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${PR_MATCH_COUNT}" != "1" || ! "${PR_HEAD_SHA}" =~ ^[0-9a-f]{40,64}$ ]]; then
            echo "::error::Production deployment requires exactly one merged-to-main PR. Direct pushes, ambiguous associations, and GitHub API failures do not deploy."
            exit 1
          fi

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            packages/board-render/package-lock.json

      - name: Test app
        working-directory: backend
        env:
          DATABASE_URL: postgres://chess_tactics:chess_tactics@localhost:5432/chess_tactics
        run: |
          npm ci
          npm test

      - name: Test exact-image release gate
        run: node --test scripts/exact-image-approval.test.mjs

      - name: Azure Login
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      - name: Compute release version (patch) — sourced from the prod deploy branch
        shell: bash
        run: |
          set -euo pipefail
          # Version-of-record lives on the long-lived `prod` DEPLOY branch (its
          # k8s/Chart.yaml appVersion), NOT on main — so a release never commits back to
          # main and main can stay branch-protected. Take the greater of prod's current
          # version and main's package.json (the latter is the FLOOR for a hand MINOR/MAJOR
          # bump made in a normal PR), then patch-bump it.
          #
          # Runs BEFORE the fingerprint + docker build on purpose: the bumped version is
          # baked into the image that deploys (Settings → About → Build) AND changes the
          # content fingerprint, so a new version always yields a fresh image tag. The bake
          # is EPHEMERAL — written into this checkout's package.json for the build only,
          # never committed to main. It's committed to prod (appVersion) further below.
          git fetch --force origin '+refs/heads/prod:refs/remotes/origin/prod'
          prod_ver="$(git show origin/prod:k8s/Chart.yaml 2>/dev/null \
            | sed -n 's/^appVersion:[[:space:]]*"\{0,1\}\([0-9][0-9.]*\)"\{0,1\}.*/\1/p' | head -1)"
          base_ver="$(node -p "require('./frontend/package.json').version")"
          backend_ver="$(node -p "require('./backend/package.json').version")"
          board_render_ver="$(node -p "require('./packages/board-render/package.json').version")"
          floor="$(printf '%s\n%s\n%s\n%s\n' "${prod_ver:-0.0.0}" "${base_ver}" "${backend_ver}" "${board_render_ver}" | sort -V | tail -1)"
          IFS=. read -r MA MI PA <<<"${floor}"
          new_version="${MA}.${MI}.$((PA + 1))"
          # Bake into THIS checkout only, for the build; not committed to main.
          (cd frontend && npm version "${new_version}" --no-git-tag-version --allow-same-version >/dev/null)
          (cd backend  && npm version "${new_version}" --no-git-tag-version --allow-same-version >/dev/null)
          (cd packages/board-render && npm version "${new_version}" --no-git-tag-version --allow-same-version >/dev/null)
          echo "APP_VERSION=${new_version}" >> "$GITHUB_ENV"
          echo "Release v${new_version} (prod ${prod_ver:-none} / package floors ${base_ver}, ${backend_ver}, ${board_render_ver})" >> "$GITHUB_STEP_SUMMARY"

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          output="$(mktemp)"
          scripts/image-fingerprint.sh \
            --image app \
            --dockerfile Dockerfile \
            --context . \
            --paths 'Dockerfile .dockerignore backend frontend packages/board-render' \
            --platform linux/amd64 \
            --base-images 'node:20-alpine' \
            | tee "${output}"
          tag="$(awk -F= '$1 == "proof_tag" { print $2 }' "${output}")"
          test -n "${tag}" || { echo "::error::image fingerprint did not emit proof_tag"; exit 1; }
          echo "TAG=${tag}" >> "$GITHUB_ENV"
          echo "Built ref $(git rev-parse HEAD) as ${REGISTRY}/${IMAGE}:${tag}" >> "$GITHUB_STEP_SUMMARY"

      - name: Login to ACR
        run: az acr login --name romainecr

      - name: Resolve immutable deployment image
        id: deployment-image
        shell: bash
        run: |
          set -euo pipefail
          candidate="$(az acr repository show \
            --name romainecr \
            --image "${IMAGE}:${TAG}" \
            --output json 2>/dev/null || true)"
          candidate_json="${candidate:-null}"
          canonical_digest="$(printf '%s' "${candidate_json}" | jq -r '.digest // empty')"
          write_enabled="$(printf '%s' "${candidate_json}" | jq -r '.changeableAttributes.writeEnabled')"
          delete_enabled="$(printf '%s' "${candidate_json}" | jq -r '.changeableAttributes.deleteEnabled')"
          if [[ ! "${canonical_digest}" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::The exact fingerprint image ${REGISTRY}/${IMAGE}:${TAG} does not exist. Build and verify the candidate image before deployment."
            exit 1
          fi
          if [[ "${write_enabled}" != "false" || "${delete_enabled}" != "false" ]]; then
            echo "::error::Candidate identity ${REGISTRY}/${IMAGE}:${TAG} is not registry-locked against overwrite and deletion. Re-run Docker Build Check and verify the locked candidate."
            exit 1
          fi

          image_ref="${REGISTRY}/${IMAGE}@${canonical_digest}"
          echo "digest=${canonical_digest}" >> "$GITHUB_OUTPUT"
          echo "IMAGE_DIGEST=${canonical_digest}" >> "$GITHUB_ENV"
          echo "DEPLOY_IMAGE_REF=${image_ref}" >> "$GITHUB_ENV"
          echo "Resolved immutable candidate ${image_ref}" >> "$GITHUB_STEP_SUMMARY"

      - name: Require explicit approval of the exact image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          PR_HEAD_SHA: ${{ steps.meta.outputs.pr_head_sha }}
          FINGERPRINT: ${{ steps.fingerprint.outputs.fingerprint }}
          IMAGE_DIGEST: ${{ steps.deployment-image.outputs.digest }}
        shell: bash
        run: |
          set -euo pipefail
          gh api --paginate --slurp \
            "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" \
            | node scripts/exact-image-approval.mjs verify \
                --comments - \
                --head "${PR_HEAD_SHA}" \
                --fingerprint "${FINGERPRINT}" \
                --digest "${IMAGE_DIGEST}"
          echo "The exact owner-approved digest is ${IMAGE_DIGEST}." >>"${GITHUB_STEP_SUMMARY}"

      - name: Publish tag + version to the prod deploy branch
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_TITLE: ${{ steps.meta.outputs.pr_title }}
          PR_NUMBER: ${{ steps.meta.outputs.pr_number }}
          PR_URL: ${{ steps.meta.outputs.pr_url }}
          COMMIT: ${{ steps.meta.outputs.commit }}
        run: |
          set -euo pipefail
          # DEPLOY STATE goes to the long-lived orphan `prod` branch, never main. prod carries
          # ONLY k8s/, so we sync main's chart onto it (template/values edits from PRs flow
          # through), then pin the already-verified image digest + appVersion + build provenance, and
          # commit there. ArgoCD tracks `prod`. main takes zero bot commits → it stays protected.
          # No [skip ci] needed: this workflow triggers on main, so a prod push starts nothing.
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          gh auth setup-git
          git fetch --force origin '+refs/heads/prod:refs/remotes/origin/prod'
          git worktree add --detach prod-deploy origin/prod
          rm -rf prod-deploy/k8s
          cp -r k8s prod-deploy/k8s
          # `tag` accepts a complete image ref when it contains `/`; pinning the
          # digest keeps Argo and the trainer on the exact owner-verified manifest.
          sed -i "s|^  tag: .*|  tag: \"${DEPLOY_IMAGE_REF}\"|" prod-deploy/k8s/values.yaml
          grep -qx "  tag: \"${DEPLOY_IMAGE_REF}\"" prod-deploy/k8s/values.yaml \
            || { echo "::error::prod values.yaml image digest was not set"; exit 1; }
          sed -i "s|^appVersion: .*|appVersion: \"${APP_VERSION}\"|" prod-deploy/k8s/Chart.yaml
          grep -qx "appVersion: \"${APP_VERSION}\"" prod-deploy/k8s/Chart.yaml \
            || { echo "::error::prod Chart.yaml appVersion was not set"; exit 1; }
          node scripts/write-build-info.mjs prod-deploy/k8s/values.yaml
          git -C prod-deploy add k8s
          if git -C prod-deploy diff --cached --quiet; then
            echo "No deploy change to publish to prod"
          else
            git -C prod-deploy commit -m "deploy: v${APP_VERSION} — image ${IMAGE_DIGEST}"
            git -C prod-deploy push origin HEAD:prod
          fi
          git worktree remove --force prod-deploy
