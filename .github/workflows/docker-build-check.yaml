name: Docker Build Check

on:
  pull_request:
  workflow_dispatch:
    inputs:
      git_ref:
        description: "Git ref or commit SHA to build. Leave blank to build the dispatch revision."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

concurrency:
  group: docker-build-check-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}-${{ inputs.git_ref || '' }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test and build app image
    runs-on: ubuntu-latest
    # PR validation images and manual prebuilds use the dev identity. Only the separate
    # main-push deployment workflow may enter the production environment.
    environment: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && 'prod' || 'dev' }}
    env:
      REGISTRY: romainecr.azurecr.io
      IMAGE: chess-tactics
    # The backend smoke-test (npm test) exercises the Postgres-backed
    # persistence endpoints, so the test job needs a real Postgres.
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: chess_tactics
          POSTGRES_PASSWORD: chess_tactics
          POSTGRES_DB: chess_tactics
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U chess_tactics"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.sha }}

      - name: Resolve image source ref
        id: source
        env:
          INPUT_REF: ${{ inputs.git_ref }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha || '' }}
        run: |
          set -euo pipefail
          git fetch --force --tags origin '+refs/heads/*:refs/remotes/origin/*'
          if [ -n "${PR_HEAD_SHA}" ]; then
            full_sha="${PR_HEAD_SHA}"
          elif [ -n "${INPUT_REF}" ]; then
            if full_sha="$(git rev-parse --verify "${INPUT_REF}^{commit}" 2>/dev/null)"; then
              :
            elif git show-ref --verify --quiet "refs/remotes/origin/${INPUT_REF}"; then
              full_sha="$(git rev-parse "refs/remotes/origin/${INPUT_REF}^{commit}")"
            elif git show-ref --verify --quiet "refs/tags/${INPUT_REF}"; then
              full_sha="$(git rev-parse "refs/tags/${INPUT_REF}^{commit}")"
            else
              echo "::error::Unable to resolve git_ref '${INPUT_REF}' to a commit."
              exit 1
            fi
          else
            full_sha="$(git rev-parse HEAD)"
          fi
          git checkout --detach "$full_sha"
          echo "Resolved image source -> ${full_sha}"
          echo "sha=${full_sha}" >> "${GITHUB_OUTPUT}"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            packages/board-render/package-lock.json

      - name: Test app
        working-directory: backend
        env:
          DATABASE_URL: postgres://chess_tactics:chess_tactics@localhost:5432/chess_tactics
        run: |
          npm ci
          npm test

      - name: Check frontend contracts
        working-directory: frontend
        run: |
          npm ci
          npm run check

      - name: Test immutable-image release contract
        run: node --test scripts/immutable-image-release.test.mjs

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v4

      # Same-repo PRs and workflow dispatches publish the content fingerprint
      # image used by Glimmung test slots. Production independently builds the
      # merged main revision; PR images are validation artifacts, not release
      # candidates that main must promote.
      - name: Azure Login
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        uses: azure/login@v3
        with:
          client-id: ${{ vars.ARM_CLIENT_ID }}
          tenant-id: ${{ vars.ARM_TENANT_ID }}
          subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

      - name: Login to ACR
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        run: az acr login --name romainecr

      - name: Compute image fingerprint
        id: fingerprint
        shell: bash
        run: |
          set -euo pipefail
          scripts/image-fingerprint.sh \
            --image app \
            --dockerfile Dockerfile \
            --context . \
            --paths 'Dockerfile .dockerignore backend frontend packages/board-render' \
            --platform linux/amd64 \
            --base-images 'node:20-alpine'

      - name: Check existing image tag
        id: image
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          tag="${{ steps.fingerprint.outputs.proof_tag }}"
          if az acr repository show-tags \
              --name romainecr \
              --repository "${IMAGE}" \
              --query "[?@=='${tag}'] | [0]" \
              --output tsv | grep -qx "${tag}"; then
            echo "target_exists=true" >>"${GITHUB_OUTPUT}"
            echo "Found reusable image ${REGISTRY}/${IMAGE}:${tag}"
          else
            echo "target_exists=false" >>"${GITHUB_OUTPUT}"
            echo "No image found for app fingerprint ${{ steps.fingerprint.outputs.fingerprint }}"
          fi

      - name: Build and push image
        if: (github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository) && steps.image.outputs.target_exists != 'true'
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            NODE_BASE=${{ steps.fingerprint.outputs.resolved_base_ref }}
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE }}:${{ steps.fingerprint.outputs.proof_tag }}
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE }}-build-cache:app,mode=max

      - name: Tag app image by commit
        # Glimmung resolves the CI-proven image for a pushed ref through this
        # commit-addressed alias. Production does not consume this alias.
        if: github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository
        shell: bash
        run: |
          set -euo pipefail
          canonical="${{ steps.fingerprint.outputs.proof_tag }}"
          commit_tag="sha-${{ steps.source.outputs.sha }}"
          az acr import --name romainecr \
            --source "${REGISTRY}/${IMAGE}:${canonical}" \
            --image "${IMAGE}:${commit_tag}" \
            --force
          echo "Tagged ${REGISTRY}/${IMAGE}:${commit_tag} -> ${canonical}"

      - name: Build image without pushing (fork PRs)
        # Fork PRs stay build-only: no ACR login, no push. This preserves the
        # original fork-safe behavior of this workflow verbatim.
        if: github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name != github.repository
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile
          platforms: linux/amd64
          build-args: |
            NODE_BASE=${{ steps.fingerprint.outputs.resolved_base_ref }}
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
