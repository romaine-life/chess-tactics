name: Bake official campaigns

# Snapshot the live OFFICIAL campaign tier (the global DB row, served publicly) back
# into the committed fallback file, so git always holds a recoverable mirror and the
# DB-down fallback stays current. ADR-0038, model A: the DB row is authoritative and
# is NEVER retired; the committed file is a weekly snapshot + outage fallback.
#
# Needs NO database credentials — the official GET is public. Models the image
# bump-bot's [skip ci] commit-to-main pattern in build-and-deploy.yaml (main is open,
# so the bot can push; [skip ci] avoids a needless rebuild — the live site already
# serves the DB content, this only refreshes the in-repo mirror/fallback).

on:
  schedule:
    - cron: '17 7 * * 1' # Mondays 07:17 UTC
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: bake-official-campaigns
  cancel-in-progress: false

jobs:
  bake:
    runs-on: ubuntu-latest
    env:
      PROD_ORIGIN: ${{ vars.PROD_ORIGIN || 'https://chess.romaine.life' }}
      OFFICIAL_ID: default
      OFFICIAL_FILE: frontend/public/assets/campaigns/official.json
    steps:
      - uses: actions/checkout@v7

      - name: Fetch live official campaigns into the fallback file
        run: |
          set -euo pipefail
          url="${PROD_ORIGIN}/api/official-campaigns/${OFFICIAL_ID}"
          echo "Fetching ${url}"
          resp="$(curl -fsS --retry 3 --retry-delay 5 "${url}")"
          # Bail if the row is empty / never published, so a missing row never blanks
          # the committed fallback.
          count="$(printf '%s' "${resp}" | jq '(.portfolio.data.campaigns // []) | length')"
          if [ "${count}" -eq 0 ]; then
            echo "No published official campaigns (empty row) — leaving the committed file untouched."
            exit 0
          fi
          # Write just the canonical Workspace { campaigns, levels } (2-space indent,
          # trailing newline) — matches the seed generator's shape.
          printf '%s' "${resp}" | jq --indent 2 '.portfolio.data | {campaigns, levels}' > "${OFFICIAL_FILE}"
          echo "Wrote ${count} campaign(s) to ${OFFICIAL_FILE}"

      - name: Commit and push if changed
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${OFFICIAL_FILE}"
          if git diff --cached --quiet; then
            echo "Official campaigns already in sync — nothing to commit."
            exit 0
          fi
          git commit -m "chore: bake official campaigns from live DB [skip ci]"
          git push origin HEAD:main
