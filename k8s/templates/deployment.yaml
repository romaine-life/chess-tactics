{{- if eq (include "chess-tactics.renderHot" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chess-tactics.resourceName" . }}
  namespace: {{ include "chess-tactics.namespace" . }}
  labels:
    app: {{ include "chess-tactics.resourceName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "chess-tactics.resourceName" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "chess-tactics.resourceName" . }}
        {{- if and (ne (include "chess-tactics.isTestEnv" .) "true") .Values.serviceAccountClientId }}
        # Triggers the azure-workload-identity webhook to project a federated
        # token for passwordless Postgres (Entra) auth. Prod only.
        azure.workload.identity/use: "true"
        {{- end }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
        - name: {{ include "chess-tactics.resourceName" . }}
          {{- $imageTag := .Values.image.tag | toString }}
          {{- $imageRef := ternary $imageTag (printf "%s:%s" .Values.image.repository $imageTag) (contains "/" $imageTag) }}
          image: {{ $imageRef | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            {{- if .Values.bgm.baseUrl }}
            # Public blob base for the BGM playlist. The backend reads
            # <baseUrl>/index.json server-side and serves /api/bgm; no Azure
            # credentials. Empty value disables BGM.
            - name: BGM_BASE_URL
              value: {{ .Values.bgm.baseUrl | quote }}
            {{- end }}
            {{- if eq (include "chess-tactics.isTestEnv" .) "true" }}
            # Test slot: ephemeral in-cluster Postgres (password mode, throwaway).
            - name: DATABASE_URL
              value: {{ printf "postgres://%s:%s@%s-postgres:5432/%s" .Values.postgres.testSlot.user .Values.postgres.testSlot.password (include "chess-tactics.resourceName" .) .Values.postgres.testSlot.database | quote }}
            {{- else }}
            # Prod: Azure Database for PostgreSQL, passwordless via workload
            # identity. The backend presents a fresh AAD token as the password
            # (see backend/server.js); host/db/user are not secrets.
            - name: POSTGRES_HOST
              value: {{ .Values.postgres.host | quote }}
            - name: POSTGRES_DATABASE
              value: {{ .Values.postgres.database | quote }}
            - name: POSTGRES_USER
              value: {{ .Values.postgres.user | quote }}
            {{- end }}
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
{{- end }}
