{{- if eq (include "chess-tactics.renderHot" .) "true" }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "chess-tactics.resourceName" . }}
  namespace: {{ include "chess-tactics.namespace" . }}
  labels:
    app: {{ include "chess-tactics.resourceName" . }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "chess-tactics.resourceName" . }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: {{ include "chess-tactics.resourceName" . }}
    spec:
      serviceAccountName: {{ .Values.serviceAccount }}
      containers:
        - name: {{ include "chess-tactics.resourceName" . }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.bgm.baseUrl }}
          env:
            # Public blob base for the BGM playlist. The backend reads
            # <baseUrl>/index.json server-side and serves /api/bgm; no Azure
            # credentials. Empty value disables BGM.
            - name: BGM_BASE_URL
              value: {{ .Values.bgm.baseUrl | quote }}
          {{- end }}
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
{{- end }}
