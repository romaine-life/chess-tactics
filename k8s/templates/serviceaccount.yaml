{{- if eq (include "chess-tactics.renderWarm" .) "true" }}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.serviceAccount }}
  namespace: {{ include "chess-tactics.namespace" . }}
  {{- if and (ne (include "chess-tactics.isTestEnv" .) "true") .Values.serviceAccountClientId }}
  annotations:
    # Workload identity for passwordless Postgres (Entra) auth in prod. The UAMI
    # `chess-tactics-identity` (tofu/identity.tf) is the DB's AAD admin; pin its
    # client id via values.serviceAccountClientId after the first tofu apply.
    # Test slots use an ephemeral in-cluster Postgres (password mode) and never
    # federate, so this is prod-only.
    azure.workload.identity/client-id: {{ .Values.serviceAccountClientId | quote }}
  {{- end }}
{{- end }}
