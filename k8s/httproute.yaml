apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: chess-tactics
  namespace: chess-tactics
spec:
  hostnames:
    - chess.romaine.life
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: main
      namespace: envoy-gateway-system
    - group: gateway.networking.x-k8s.io
      kind: XListenerSet
      name: chess-tactics
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: chess-tactics
          port: 80
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
