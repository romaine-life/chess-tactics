apiVersion: apps/v1
kind: Deployment
metadata:
  name: chess-tactics
  namespace: chess-tactics
  labels:
    app: chess-tactics
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chess-tactics
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: chess-tactics
    spec:
      serviceAccountName: chess-tactics
      containers:
        - name: chess-tactics
          image: romainecr.azurecr.io/chess-tactics:a8d4270
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
