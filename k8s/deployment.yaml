apiVersion: apps/v1
kind: Deployment
metadata:
  name: chimera-board
  namespace: chimera-board
  labels:
    app: chimera-board
spec:
  replicas: 1
  selector:
    matchLabels:
      app: chimera-board
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: chimera-board
    spec:
      serviceAccountName: chimera-board
      containers:
        - name: chimera-board
          image: romainecr.azurecr.io/chimera-board:placeholder
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 5
            failureThreshold: 10
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 30
            failureThreshold: 3
