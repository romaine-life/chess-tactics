# The content fingerprint image tag is bumped by
# .github/workflows/build-and-deploy.yaml on every push to main (via sed on
# this file).
image:
  repository: romainecr.azurecr.io/chess-tactics
  # Quoted so YAML never reinterprets image tag characters.
  tag: "app-b89cf141a4cc3fb0542564b04451eb2f73fc9638b33c8492bc500ccc4d0d493c"
  pullPolicy: IfNotPresent

name: chess-tactics
namespace: chess-tactics

hostname: chess.romaine.life

# normal = full app (prod, what ArgoCD renders).
# warm   = preliminary test-slot scaffolding only (SA, cert, route, listener).
# hot    = warm + the running workload (Deployment, Service).
# Glimmung's native_webapp test-slot installer sets renderMode + testEnv.slotName.
renderMode: normal

testEnv:
  slotName: ""

# Live-preview lane (glimmung docs/live-preview-plan.md). OFF by default: a
# normal (prod / ArgoCD) or validation (warm/hot test-slot) install renders no
# edge, so the chart renders byte-identical to today and changes nothing until
# Glimmung sets livePreview.enabled=true on a PREVIEW lease. This is a SEPARATE
# lane from validation — the faithful image-deploy lane is untouched.
#
# When enabled, Glimmung vendors its `live-preview-edge` library partial into
# this chart's charts/live-preview-edge/ at provision time (published as an
# in-cluster ConfigMap — this chart declares NO Helm dependency and commits NO
# copy of the partial; ACR Basic SKU rules out an oci:// dependency). The partial
# then runs the generic edge in front of chess-tactics' backend: the edge becomes
# the served port, the app backend listens internally on :3000 (loopback
# upstream), and the edge serves the dev's pushed frontend override-first /
# fresh-passthrough. Glimmung --sets image/upstream/authorizedSubject/
# backendPrefixes/enabled per preview lease. The single-serving-pod invariant
# (replicas=1) is enforced by the live-preview-edge.replicas helper.
#
# AUTH: the edge validates pushes against auth.romaine.life's public JWKS
# (RS256 over HTTPS); the slot pod needs only outbound HTTPS reachability, which
# it already has. NO projected auth.romaine.life token is added to the pod.
livePreview:
  enabled: false
  image:
    repository: romainecr.azurecr.io/glimmung-live-preview-edge
    # Empty by default — there is NO floating ":edge" default. chess-tactics does
    # not own the edge-image lockstep (Glimmung does); the preview provision
    # --sets the fingerprint tag from the control plane's Settings. An empty tag
    # with enabled=true is a hard render error (the partial `required`s it), so a
    # missing edge image surfaces loudly, never as a silent ImagePull.
    tag: ""
    pullPolicy: IfNotPresent
  port: 8080
  servedPortName: http
  upstream:
    # chess-tactics' backend listens internally on :3000 (== live_preview
    # backend_port); the edge fronts it over loopback.
    url: "http://127.0.0.1:3000"
  # Request path prefixes always reverse-proxied to the backend (the stable API
  # + health stay reachable through the edge regardless of override state).
  # chess-tactics' backend serves /api/* and /health; everything else is
  # frontend served override-first / fresh-passthrough.
  backendPrefixes:
    - /api
    - /health
  authorizedSubject: ""
  override:
    volumeName: live-preview-override
    mountPath: /var/run/glimmung-live-preview
  resources: {}

# Service account used by the app pod. In prod it carries an
# azure.workload.identity/client-id annotation (serviceAccountClientId below) so
# the backend can authenticate to Azure Database for PostgreSQL passwordless via
# a federated token. Test slots use an ephemeral in-cluster Postgres and do not
# federate. (The BGM index/tracks are still public-read over plain HTTPS.)
serviceAccount: chess-tactics

# Workload-identity client id of the chess-tactics-identity UAMI (tofu output
# `app_identity_client_id`). That UAMI is the Postgres server's Entra admin. Copy
# the value in after the first `tofu apply`; while empty the SA is left
# un-annotated and prod persistence returns 503 until it is pinned — the game
# itself still serves.
serviceAccountClientId: "f9efb041-8b45-4cba-8f79-6a9546f73da1"

# Azure Database for PostgreSQL — the durable game/design document store
# (levels, campaigns, campaign workspaces, design portfolios). Art assets are
# committed files, not database rows. Provisioned by tofu/ (postgres.tf +
# identity.tf). host/database/user are deterministic from tofu and pre-filled;
# confirm against the outputs after apply:
#   host     <- terraform output postgres_fqdn
#   database <- terraform output postgres_database_name
#   user     <- terraform output app_identity_name
# None of these are secrets — auth is the workload-identity AAD token.
postgres:
  host: "chess-tactics-pg.postgres.database.azure.com"
  database: "chess_tactics"
  user: "chess-tactics-identity"
  # Throwaway in-cluster Postgres for test slots only (password mode); never used
  # in prod. Data lives on emptyDir and dies with the slot.
  testSlot:
    image: postgres:16-alpine
    user: chess_tactics
    password: chess_tactics
    database: chess_tactics

# Background music: public blob container base URL provisioned by tofu/
# (storage account `chesstacticsmedia`, container `bgm`). The backend reads
# <baseUrl>/index.json and serves the playlist at /api/bgm; tracks stream from
# <baseUrl>/<file>. Empty disables BGM (e.g. before the container is populated).
bgm:
  baseUrl: "https://chesstacticsmedia.blob.core.windows.net/bgm"

ingress:
  gatewayName: main
  gatewayNamespace: envoy-gateway-system
  certIssuer: letsencrypt-prod
  tlsSecret: chess-tactics-tls
